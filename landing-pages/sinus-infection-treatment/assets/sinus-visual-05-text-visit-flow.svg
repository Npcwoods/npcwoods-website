<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NPCWoods sinus text visit flow</title>
  <desc id="desc">A friendly flow illustration showing a patient texting sinus symptoms, Chris reviewing the story, and the next step or prescription being sent when appropriate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.55" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151625"/>
      <stop offset="1" stop-color="#364057"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#17356f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <g transform="translate(92 76)">
    <text x="0" y="46" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#2563eb" letter-spacing="4">WHAT HAPPENS NEXT</text>
    <text x="0" y="112" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#151625">A text visit should feel simple.</text>
    <text x="0" y="160" font-family="Inter, Arial, sans-serif" font-size="24" fill="#596174">$59 flat. No video call. Tell us the pattern and Chris sorts the lane.</text>
    <g transform="translate(24 222)">
      <g filter="url(#shadow)">
        <rect x="0" y="0" width="246" height="356" rx="38" fill="url(#phone)"/>
        <rect x="22" y="34" width="202" height="288" rx="24" fill="#f8fbff"/>
        <circle cx="123" cy="334" r="10" fill="#6b7280"/>
        <rect x="48" y="76" width="128" height="42" rx="18" fill="#dbeafe"/>
        <text x="64" y="103" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17356f">Day 6. Pressure.</text>
        <rect x="58" y="136" width="118" height="42" rx="18" fill="#fff7e8"/>
        <text x="74" y="163" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#8a5a18">Not improving.</text>
        <rect x="40" y="196" width="146" height="42" rx="18" fill="#ecfdf5"/>
        <text x="56" y="223" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#0f5132">Tried saline.</text>
      </g>
      <path d="M292 178h118" fill="none" stroke="#bfdbfe" stroke-width="12" stroke-linecap="round"/>
      <path d="M392 147l40 31-40 31" fill="none" stroke="#bfdbfe" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(454 42)" filter="url(#shadow)">
        <rect x="0" y="0" width="282" height="270" rx="32" fill="#ffffff"/>
        <circle cx="82" cy="78" r="42" fill="#dbeafe"/>
        <path d="M63 88c4-43 48-53 68-18 18 32-14 69-50 65-19-2-31-17-18-47z" fill="#2563eb"/>
        <text x="36" y="158" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900" fill="#151625">Chris reviews it</text>
        <text x="36" y="198" font-family="Inter, Arial, sans-serif" font-size="19" fill="#596174">Follow-up questions if the lane is not clear.</text>
        <text x="36" y="236" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#2563eb">Human review, not a bot.</text>
      </g>
      <path d="M774 178h118" fill="none" stroke="#bfdbfe" stroke-width="12" stroke-linecap="round"/>
      <path d="M874 147l40 31-40 31" fill="none" stroke="#bfdbfe" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(934 42)" filter="url(#shadow)">
        <rect x="0" y="0" width="214" height="270" rx="32" fill="#ffffff"/>
        <rect x="48" y="50" width="118" height="94" rx="20" fill="#ecfdf5" stroke="#a7f3d0"/>
        <path d="M74 112h66M74 84h66" stroke="#0f8a55" stroke-width="12" stroke-linecap="round"/>
        <path d="M107 62v70" stroke="#0f8a55" stroke-width="12" stroke-linecap="round"/>
        <text x="32" y="190" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#151625">Right next step</text>
        <text x="32" y="226" font-family="Inter, Arial, sans-serif" font-size="18" fill="#596174">Plan or pharmacy when appropriate.</text>
      </g>
    </g>
    <g transform="translate(72 630)">
      <rect x="0" y="-36" width="872" height="74" rx="22" fill="#ffffff" stroke="#dbeafe"/>
      <text x="34" y="11" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#17356f">Best first text:</text>
      <text x="208" y="11" font-family="Inter, Arial, sans-serif" font-size="22" fill="#596174">day, direction, pressure, fever, drainage, what you tried.</text>
    </g>
  </g>
</svg>
