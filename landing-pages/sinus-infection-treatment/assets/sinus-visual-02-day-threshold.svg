<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Day five to seven sinus threshold</title>
  <desc id="desc">A calendar-style timeline highlighting days five through seven as the point to pay closer attention to sinus symptoms that are not improving.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12307c"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#61a5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#091a45" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <circle cx="1075" cy="90" r="190" fill="#ffffff" opacity="0.08"/>
  <circle cx="166" cy="630" r="230" fill="#ffffff" opacity="0.1"/>
  <g transform="translate(92 84)" filter="url(#shadow)">
    <rect x="0" y="0" width="1016" height="592" rx="36" fill="#fffdf8"/>
    <text x="58" y="78" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#2563eb" letter-spacing="4">THE SINUS THRESHOLD</text>
    <text x="58" y="136" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#151625">Day 5-7 is the “pay attention” window.</text>
    <text x="60" y="184" font-family="Inter, Arial, sans-serif" font-size="24" fill="#596174">Not a magic antibiotic rule. A useful point to decide if the story needs review.</text>
    <g transform="translate(58 254)">
      <rect x="0" y="0" width="900" height="96" rx="24" fill="#f3f6fb"/>
      <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
        <rect x="18" y="18" width="82" height="60" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="59" y="56" font-size="22" font-weight="900" fill="#8a90a0">1</text>
        <rect x="116" y="18" width="82" height="60" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="157" y="56" font-size="22" font-weight="900" fill="#8a90a0">2</text>
        <rect x="214" y="18" width="82" height="60" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="255" y="56" font-size="22" font-weight="900" fill="#8a90a0">3</text>
        <rect x="312" y="18" width="82" height="60" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
        <text x="353" y="56" font-size="22" font-weight="900" fill="#8a90a0">4</text>
        <rect x="410" y="10" width="230" height="76" rx="20" fill="#2563eb"/>
        <text x="525" y="56" font-size="25" font-weight="900" fill="#ffffff">5-7</text>
        <rect x="656" y="18" width="82" height="60" rx="16" fill="#ffffff" stroke="#dbeafe"/>
        <text x="697" y="56" font-size="22" font-weight="900" fill="#2563eb">8</text>
        <rect x="754" y="18" width="126" height="60" rx="16" fill="#fff7e8" stroke="#f2d19b"/>
        <text x="817" y="56" font-size="22" font-weight="900" fill="#9a5a10">10+</text>
      </g>
    </g>
    <g transform="translate(74 408)">
      <path d="M0 80c132-100 232-102 337-52 95 45 163 41 246-26 82-67 174-56 278 46" fill="none" stroke="#dbeafe" stroke-width="20" stroke-linecap="round"/>
      <path d="M411 31c61 34 122 26 185-20" fill="none" stroke="#2563eb" stroke-width="20" stroke-linecap="round"/>
      <circle cx="500" cy="14" r="18" fill="#ffffff" stroke="#2563eb" stroke-width="8"/>
      <text x="410" y="128" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#17356f">Still not turning the corner?</text>
      <text x="410" y="162" font-family="Inter, Arial, sans-serif" font-size="20" fill="#596174">That is the moment to text the pattern.</text>
    </g>
  </g>
</svg>
